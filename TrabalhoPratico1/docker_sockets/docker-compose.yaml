services:
  database:
    build:
      context: servidor_docker_database/
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 5000
    ports:
      - "5000:5000"
  backend:
    build:
      context: servidor_docker_backend/
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 5001
      DATABASE_PORT: 5000
    ports:
      - "5001:5001"
    depends_on:
      - database