services:
  backend:
    build:
      context: servidor_docker_backend/
      dockerfile: Dockerfile
    environment:
      DATABASE_PORT: 5000
      SERVER_PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      - database
  database:
    build:
      context: servidor_docker_db/
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 5000
    ports:
      - "5000:5000"