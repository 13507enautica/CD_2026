<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Embarcações</title>
    <link rel="stylesheet" href="/static/styles/styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/main">Início</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Registro de Embarcações</h1>
    
        <!-- Exibição de mensagens de feedback -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="messages">
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}
    
        <form enctype="multipart/form-data" id="register-boat-form" method="POST" action="/doRegisterBoat">
            <label for="boat-name">Nome da Embarcação:</label>
            <input type="text" id="boat-name" name="boat-name" required>
    
            <label for="boat-type">Tipo de Embarcação:</label>
            <select id="boat-type" name="boat-type" required>
                <option value="">Selecione</option>
                <option value="veleiro">Veleiro</option>
                <option value="lancha">Lancha</option>
                <option value="iate">Iate</option>
                <option value="pesca">Barco de Pesca</option>
            </select>
    
            <label for="registration-number">Número de Registro:</label>
            <input type="text" id="registration-number" name="registration-number" required>
    
            <label for="year-built">Ano de Construção:</label>
            <input type="number" id="year-built" name="year-built" min="1900" max="2025" required>
    
            <label for="length">Comprimento (em metros):</label>
            <input type="number" id="length" name="length" step="0.01" required>

            <label for="boat-image">Foto de Barco:</label>
			<input type="file" id="boat-image" name="boat-image" required>
    
            <button type="submit">Registrar Embarcação</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 Porto. Todos os direitos reservados.</p>
    </footer>

    <script>
        var boatImageField = document.getElementById('boat-image')
        boatImageField.onchange = function() {
                var fileType = this.files[0]['type']
                console.log(fileType);

                if(this.files[0].size > 2097152){
                    alert("Ficheiro demasiado grande! O ficheiro não pode ter mais que 2MB.");
                    this.value = "";
                    return;
                }
                else if (!(fileType.split('/')[0] === 'image')) {
                    alert("Ficheiro tem de ser uma imagem!");
                    this.value = "";
                    return;
                };
            };

        document.getElementById('register-boat-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const boatName = document.getElementById('boat-name').value.trim();
            const boatType = document.getElementById('boat-type').value;
            const registrationNumber = document.getElementById('registration-number').value.trim();
            const yearBuilt = document.getElementById('year-built').value;
            const length = document.getElementById('length').value;
            const boatImage = document.getElementById('boat-image').value;

            if (!boatName || !boatType || !registrationNumber || !yearBuilt || !length || !boatImage) {
                alert('Todos os campos são obrigatórios!');
                return;
            }

            if (isNaN(yearBuilt) || yearBuilt < 1900 || yearBuilt > 2025) {
                alert('Por favor, insira um ano válido (entre 1900 e 2025).');
                return;
            }

            if (length <= 0) {
                alert('O comprimento deve ser maior que 0.');
                return;
            }

            this.submit();
        });
    </script>
</body>
</html>

<script>
const registerBoat = async (boatData) => {
    const response = await fetch('/api/registerBoat', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(boatData)
    });

    if (!response.ok) {
        throw new Error('Erro ao registrar embarcação!');
    }

    return response.json();
};
</script>
